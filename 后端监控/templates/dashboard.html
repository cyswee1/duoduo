<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    .header {
      margin-bottom: 24px;
    }
    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .meta {
      color: #6b7280;
      font-size: 14px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .card .label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 26px;
      font-weight: 700;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }
    th {
      background: #f9fafb;
      color: #374151;
    }
    .ok {
      color: #059669;
      font-weight: 600;
    }
    .warn {
      color: #dc2626;
      font-weight: 600;
    }
    .empty {
      color: #9ca3af;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>{{TITLE}}</h1>
      <div class="meta">团队：{{TEAM}} ｜ 阶段：{{PHASE}} ｜ 更新时间：{{UPDATED_AT}}</div>
    </header>

    <section class="cards">
      <div class="card">
        <div class="label">监控项</div>
        <div class="value">{{TOTAL_COUNT}}</div>
      </div>
      <div class="card">
        <div class="label">达标项</div>
        <div class="value ok">{{OK_COUNT}}</div>
      </div>
      <div class="card">
        <div class="label">预警项</div>
        <div class="value warn">{{WARN_COUNT}}</div>
      </div>
    </section>

    <section class="section">
      <h2>监控明细</h2>
      <table>
        <thead>
          {{TABLE_HEADER}}
        </thead>
        <tbody>
          {{TABLE_ROWS}}
        </tbody>
      </table>
      <div class="empty">{{EMPTY_TEXT}}</div>
    </section>
  </main>
</body>
</html>
