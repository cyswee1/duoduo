phases:
  phase1:
    type: registration_reminder
    description: TL 日志提交提醒（续费目标）
    message_template: '### 📋 {team} 续费目标提醒

      **未提交日志 TL**：{unregistered_tls}

      请在 {deadline} 前提交今日续费目标日志

      '
  phase2:
    type: renewal_monitor
    description: 续费业绩预警
    excel_parsing:
      daily_call:
        header_rows:
        - 3
        - 4
        columns:
          team_group:
          - 团队/小组
          - 团队/小组
          tl:
          - 负责人
          - 负责人
          renewal_gmv:
          - 续费GMV
          - 续费GMV
          call_duration:
          - 总有效通话时长
          - 总有效通话时长
          call_count:
          - 总拨打次数
          - 总拨打次数
      pool_followup:
        header_rows:
        - 3
        - 4
        columns:
          team_group:
          - 团队/小组
          - 团队/小组
          tl:
          - 负责人
          - 负责人
          followup_rate:
          - 外呼跟进率
          - 外呼跟进率
      pool_followup_rate:
        header_rows:
        - 3
        - 4
        columns:
          team_group:
          - 团队/小组
          - 团队/小组
          tl:
          - 负责人
          - 负责人
          followup_rate:
          - 外呼跟进率
          - 外呼跟进率
    alert_rules:
    - name: 低活跃预警
      condition: renewal_gmv == 0 and call_duration < call_duration_target * 0.6 and
        call_count < call_count_target * 0.6
    - name: 低跟进预警
      condition: renewal_gmv == 0 and followup_rate < followup_target * 0.6
    table_render:
      title_template: 【续费业绩预警 — {team}团队】
      headers:
      - 小组
      - TL
      - 今日续费目标
      - 今日续费GMV
      - 今日通时目标
      - 今日通时
      - 今日通次目标
      - 今日通次
      - 外呼跟进目标
      - 外呼跟进率
      - 外呼跟进率GAP
      color_rules:
      - column_index: 3
        condition: == 0
        color: red
      - column_index: 10
        condition: '> 0'
        color: red
notifier:
  type: dingtalk_robot
  robot_code_key: DINGTALK_ROBOT_CODE
  app_key: DINGTALK_APP_KEY
  app_secret_key: DINGTALK_APP_SECRET
globals:
  output_dir: ~/Downloads
