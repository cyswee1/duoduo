phases:
  phase1:
    type: registration_reminder
    description: TL 日志提交提醒（服务目标）
    message_template: '### 📋 {team} 服务目标提醒

      **未提交日志 TL**：{unregistered_tls}

      请在 {deadline} 前提交今日服务目标日志

      '
  phase2:
    type: service_monitor
    description: 服务指标预警
    excel_parsing:
      first_call:
        header_rows: null
        data_start_row: 3
        group_col_index: 1
        first_call_rate_col_index: 20
      first_lesson_stats:
        header_rows:
        - 1
        columns:
          team_group:
          - 团队
          first_lesson_rate:
          - 首课及时跟进率
      first_specialist_stats:
        header_rows:
        - 1
        columns:
          team_group:
          - 团队
          first_specialist_rate:
          - 首专及时跟进率
      followup:
        header_rows:
        - 3
        - 4
        columns:
          team_group:
          - 团队/小组
          - 团队/小组
          tl:
          - 负责人
          - 负责人
          service_pool_followup_rate:
          - 服务池
          - 外呼跟进率
          service_pool_effective_rate:
          - 服务池
          - 综合有效跟进率
    thresholds:
      first_call_rate: 0.8
      first_lesson_rate: 0.8
      first_specialist_rate: 0.8
      service_pool_followup_rate: 0.6
      service_pool_effective_rate: 0.6
    table_render:
      title_template: 【服务指标预警 — {team}团队】
      headers:
      - 小组
      - TL
      - 首通目标
      - 首通跟进率
      - 首课目标
      - 首课跟进率
      - 首专目标
      - 首专跟进率
      - 服务池跟进目标
      - 服务池跟进率
      - 有效跟进目标
      - 有效跟进率
      color_rules:
      - column_index: 3
        condition: < target
        color: red
      - column_index: 5
        condition: < target
        color: red
      - column_index: 7
        condition: < target
        color: red
      - column_index: 9
        condition: < target
        color: red
      - column_index: 11
        condition: < target
        color: red
notifier:
  type: dingtalk_robot
  robot_code_key: DINGTALK_ROBOT_CODE
  app_key: DINGTALK_APP_KEY
  app_secret_key: DINGTALK_APP_SECRET
globals:
