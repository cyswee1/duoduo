datasources:
  smartbi:
    url_key: BI_URL
    user_key: BI_USER
    pass_key: BI_PASS
    reports:
      progress:
        name: 转介绍益智业绩播报_LP维度_末次渠道
        output_filename: 业绩播报_监控.xlsx
        date_filters: []
