phases:
  phase1:
    type: registration_reminder
    description: TL 日志提交提醒
    message_template: '### 📋 {team} 转介绍目标提醒

      **未提交日志 TL**：{unregistered_tls}

      请在 {deadline} 前提交今日目标日志

      '
  phase2:
    type: progress_monitor
    description: 转介绍业绩进度监控
    datasource: smartbi.progress
    excel_parsing:
      header_rows:
      - 3
      - 4
      columns:
        team_group:
        - 团队/小组
        - 'Unnamed: 2_level_1'
        lp:
        - LP
        - 'Unnamed: 3_level_1'
        tl:
        - 负责人
        - 'Unnamed: 4_level_1'
        today_count:
        - 今日完成情况
        - 今日例子数
        monthly_target:
        - 海外转介绍例子数据
        - 海外转介绍例子目标
        total_count:
        - 海外转介绍例子数据
        - 全体带海外例子数
        today_target:
        - 今日完成情况
        - 今日例子目标
        monthly_completion_rate:
        - 海外转介绍例子数据
        - 例子达成率-月度
    thresholds:
      progress: 0.8
    table_render:
      title_template: 【转介绍业绩进度监控 — {team}团队】
      headers:
      - 小组
      - TL
      - 今日目标
      - 今日例子
      - 今日达标率
      - 月目标
      - 月例子
      - 月进度
      - GAP
      color_rules:
      - column_index: 4
        condition: < 0.8
        color: red
      - column_index: 8
        condition: '> 0'
        color: red
  phase3:
    type: pool_warning
    description: 转介绍外呼跟进预警
    datasource: smartbi.followup
    pool_configs:
    - name: 续费带R
      column_offset: 22
      target: 0.5
    - name: M1-M3（首消）
      column_offset: 50
      target: 0.5
    - name: 服务池
      column_offset: 112
      target: 0.5
    thresholds:
      call_low: 0.5
      min_call_with_zero_conversion: 10
    table_render:
      title_template: 【转介绍外呼跟进监控 — {team}团队】
      headers:
      - 小组
      - 池子
      - 实际跟进率
      - 目标
      - 状态
      color_rules:
      - column_index: 2
        condition: status == '未达标'
        color: red
      - column_index: 4
        condition: status == '未达标'
        color: red
notifier:
  type: dingtalk_robot
  robot_code_key: DINGTALK_ROBOT_CODE
  app_key: DINGTALK_APP_KEY
  app_secret_key: DINGTALK_APP_SECRET
globals:
  output_dir: ~/Downloads
