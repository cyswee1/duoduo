  notable:
    app_key: DINGTALK_APP_KEY
    app_secret_key: DINGTALK_APP_SECRET
    base_id: MNDoBb60VLrMRmMMtBrGgBZm8lemrZQ3
    operator_userid_key: DINGTALK_MY_USERID
    table_url: "https://alidocs.dingtalk.com/i/nodes/MNDoBb60VLrMRmMMtBrGgBZm8lemrZQ3"

  globals:
